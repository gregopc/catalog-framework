spring.application.name=smart-movies

# -----------------------------------------------------------------------------
# Banco de dados
# -----------------------------------------------------------------------------

spring.datasource.url=jdbc:h2:file:./data/smartmovies-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true

# -----------------------------------------------------------------------------
# Servidor (Porta 8081 para não conflitar com a SmartStore na porta 8080)
# -----------------------------------------------------------------------------

server.port=8081
server.forward-headers-strategy=framework

# -----------------------------------------------------------------------------
# Gemini
# -----------------------------------------------------------------------------

gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# Ajusta a extração de palavras-chave para o domínio da aplicação
catalog.ai.domain-hint=Foque em filmes, diretores, atores, sinopses e plataformas de streaming.

# -----------------------------------------------------------------------------
# OpenAPI / Swagger
# -----------------------------------------------------------------------------

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.info.title=SmartMovies API
springdoc.info.description=API de exemplo baseada no Catalog Framework para busca de filmes
springdoc.info.version=1.0
