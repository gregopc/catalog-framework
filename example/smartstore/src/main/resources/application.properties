spring.application.name=smartstore

# -----------------------------------------------------------------------------
# Banco de dados
# -----------------------------------------------------------------------------

spring.datasource.url=jdbc:h2:file:./data/smartstore-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true

# -----------------------------------------------------------------------------
# Servidor
# -----------------------------------------------------------------------------

server.forward-headers-strategy=framework

# -----------------------------------------------------------------------------
# Gemini
# -----------------------------------------------------------------------------

gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# Ajusta a extração de palavras-chave para o domínio da aplicação
catalog.ai.domain-hint=Foque em alimentos, ingredientes e produtos de supermercado.

# -----------------------------------------------------------------------------
# OpenAPI / Swagger
# -----------------------------------------------------------------------------

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.info.title=SmartStore API
springdoc.info.description=API de exemplo baseada no Catalog Framework
springdoc.info.version=1.0